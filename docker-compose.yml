services:
  # ------------------------------------------------
  # Base de Datos PostgreSQL
  # ------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: platam_db
    restart: always
    env_file:
      - ./.env.docker
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: platam_pay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./.ai/schemas/database-schema.sql:/docker-entrypoint-initdb.d/01-database-schema.sql:ro
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------
  # LocalStack — simula AWS (SQS + S3) en local
  # ------------------------------------------------
  localstack:
    image: localstack/localstack:3.5
    container_name: platam_localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs,s3
      AWS_DEFAULT_REGION: us-east-1
      EDGE_PORT: "4566"
      DEBUG: "0"
      # Sin esto, LocalStack 3 devuelve URLs tipo sqs.us-east-1.localhost.localstack.cloud y no coinciden con /000000000000/...
      SQS_ENDPOINT_STRATEGY: "off"
    volumes:
      - ./.docker/localstack/ready.d:/etc/localstack/init/ready.d:ro
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

  # Crea la cola aunque el script ready.d falle (p. ej. CRLF en Windows sobre volúmenes bind).
  localstack-bootstrap:
    image: amazon/aws-cli:2.17.56
    container_name: platam_localstack_bootstrap
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        ENDPOINT=http://localstack:4566
        for name in user-events-queue transversal-upload-files transversal-inbound transversal-outbound notifications-inbound; do
          aws --endpoint-url="$$ENDPOINT" sqs create-queue --queue-name "$$name" || true
          aws --endpoint-url="$$ENDPOINT" sqs get-queue-url --queue-name "$$name"
        done
        aws --endpoint-url="$$ENDPOINT" sqs list-queues
    networks:
      - backend-network
    restart: "no"

  # ------------------------------------------------
  # Microservicio: Suppliers (NestJS + TypeORM + SQS)
  # ------------------------------------------------
  suppliers-service:
    build:
      context: .
      dockerfile: apps/suppliers-ms/Dockerfile
    image: platam/suppliers-ms:local
    container_name: platam_suppliers
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env.docker
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-platam_pay}
      TYPEORM_TYPE: postgres
      TYPEORM_PORT: 5432
      SUPPLIERS_MS_PORT: 8081
      RUES_API_BASE_URL: ${RUES_API_BASE_URL:-https://ollama-rues.5n921h.easypanel.host}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      TRANSVERSAL_SQS_OUTBOUND_QUEUE_URL: ${TRANSVERSAL_SQS_OUTBOUND_QUEUE_URL}
      # Debe coincidir con TRANSVERSAL_SQS_OUTBOUND_QUEUE_URL (archivos subidos vuelven por aquí).
      TRANSVERSAL_SQS_INBOUND_QUEUE_URL: ${TRANSVERSAL_SQS_OUTBOUND_QUEUE_URL}
      TRANSVERSAL_SQS_UPLOAD_FILES_QUEUE_URL: ${TRANSVERSAL_SQS_UPLOAD_FILES_QUEUE_URL:-}
      AWS_SQS_ENDPOINT: ${AWS_SQS_ENDPOINT:-http://localstack:4566}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    ports:
      - "8081:8081"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:8081/api/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - backend-network

  # ------------------------------------------------
  # Microservicio: Transversal (NestJS + TypeORM + SQS)
  # ------------------------------------------------
  transversal-service:
    build:
      context: .
      dockerfile: apps/transversal-ms/Dockerfile
    image: platam/transversal-ms:local
    container_name: platam_transversal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env.docker
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-platam_pay}
      TYPEORM_TYPE: postgres
      TYPEORM_PORT: 5432
      TRANSVERSAL_MS_PORT: 8080
      RUES_API_BASE_URL: ${RUES_API_BASE_URL:-https://ollama-rues.5n921h.easypanel.host}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      TRANSVERSAL_SQS_OUTBOUND_QUEUE_URL: ${TRANSVERSAL_SQS_OUTBOUND_QUEUE_URL:-}
      TRANSVERSAL_SQS_INBOUND_QUEUE_URL: ${TRANSVERSAL_SQS_INBOUND_QUEUE_URL:-}
      TRANSVERSAL_SQS_UPLOAD_FILES_QUEUE_URL: ${TRANSVERSAL_SQS_UPLOAD_FILES_QUEUE_URL:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-platam-partners-storage}
      AWS_S3_REGION: ${AWS_S3_REGION:-us-east-2}
    ports:
      - "8082:8080"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:8080/api/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - backend-network

  # ------------------------------------------------
  # Microservicio: Products (NestJS + TypeORM + SQS)
  # ------------------------------------------------
  products-service:
    build:
      context: .
      dockerfile: apps/products-ms/Dockerfile
    image: platam/products-ms:local
    container_name: platam_products
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      localstack-bootstrap:
        condition: service_completed_successfully
    env_file:
      - ./.env.docker
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-platam_pay}
      TYPEORM_TYPE: postgres
      TYPEORM_PORT: 5432
      PRODUCTS_MS_PORT: 8080
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_SQS_ENDPOINT: http://localstack:4566
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      PRODUCTS_SQS_OUTBOUND_QUEUE_URL: ${PRODUCTS_SQS_OUTBOUND_QUEUE_URL:-}
      PRODUCTS_SQS_INBOUND_QUEUE_URL: ${PRODUCTS_SQS_INBOUND_QUEUE_URL:-}
    ports:
      - "8083:8080"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:8080/api/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - backend-network

  # ------------------------------------------------
  # Microservicio: Contracts (NestJS + TypeORM + SQS)
  # ------------------------------------------------
  contracts-service:
    build:
      context: .
      dockerfile: apps/contracts-ms/Dockerfile
    image: platam/contracts-ms:local
    container_name: platam_contracts
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      localstack-bootstrap:
        condition: service_completed_successfully
    env_file:
      - ./.env.docker
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-platam_pay}
      TYPEORM_TYPE: postgres
      TYPEORM_PORT: 5432
      CONTRACTS_MS_PORT: 8080
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_SQS_ENDPOINT: http://localstack:4566
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      CONTRACTS_SQS_OUTBOUND_QUEUE_URL: ${CONTRACTS_SQS_OUTBOUND_QUEUE_URL:-}
      CONTRACTS_SQS_CREATE_CONTRACT_QUEUE_URL: ${CONTRACTS_SQS_CREATE_CONTRACT_QUEUE_URL:-}
      CONTRACTS_SQS_GET_CONTRACT_QUEUE_URL: ${CONTRACTS_SQS_GET_CONTRACT_QUEUE_URL:-}
    ports:
      - "8084:8080"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:8080/api/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - backend-network

# ------------------------------------------------
# Redes y Volúmenes
# ------------------------------------------------
networks:
  backend-network:
    driver: bridge
    name: platam_backend_net

volumes:
  postgres_data:
    driver: local